name: Fetch Latest Tweets

on:
  schedule:
    - cron: '0 * * * *' # Runs every 1 hour
  workflow_dispatch: # Allows manual trigger

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade twikit

      - name: Run fetch script
        env:
          X_COOKIES: ${{ secrets.X_COOKIES }}
          X_USERNAME: ${{ secrets.X_USERNAME }}
          X_EMAIL: ${{ secrets.X_EMAIL }}
          X_PASSWORD: ${{ secrets.X_PASSWORD }}
        run: python scripts/fetch_tweets.py

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated: Sync latest student queries from X"
          file_pattern: 'src/queries.json'
