name: Sync Tweets Manually

on:
  repository_dispatch:
    types: [sync_tweets]
  workflow_dispatch: # Still allow manual run

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update queries.json
        run: |
          echo '${{ github.event.client_payload.tweets }}' > new_tweets.json
          python -c "
          import json, os
          with open('src/queries.json', 'r') as f: queries = json.load(f)
          with open('new_tweets.json', 'r') as f: new_batch = json.load(f)
          existing_ids = {str(q['id']) for q in queries}
          added = 0
          for t in new_batch:
              if str(t['id']) not in existing_ids:
                  queries.insert(0, t)
                  existing_ids.add(str(t['id']))
                  added += 1
          queries = queries[:100]
          with open('src/queries.json', 'w') as f: json.dump(queries, f, indent=2)
          print(f'Added {added} new tweets')
          "

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Manual Sync: Added new student queries via Bookmarklet"
          file_pattern: 'src/queries.json'
