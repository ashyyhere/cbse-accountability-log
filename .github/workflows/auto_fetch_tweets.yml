name: Auto Fetch Tweets and Deploy

on:
  schedule:
    - cron: '0 */4 * * *' # every 4 hours
  workflow_dispatch:

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    env:
      X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests ntscraper

      - name: Fetch tweets from X topics
        run: python scripts/fetch_tweets.py

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: npm install

      - name: Build site
        run: npm run build

      - name: Commit and push tweet updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/queries.json
          if ! git diff --cached --quiet; then
            git commit -m "Automated tweet sync: fetch latest X posts"
            git push
          else
            echo "No tweet changes to commit."
          fi
