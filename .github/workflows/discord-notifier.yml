name: Discord Repository Notifier

on:
  push:
    branches: [main, master]
  pull_request:
    types: [opened, reopened, closed, edited, labeled, unlabeled, synchronized]
  fork:
  watch:
  issues:
    types: [opened, reopened, closed, edited]
  release:
    types: [published, created]
  workflow_dispatch:

jobs:
  notify:
    name: Send Discord notification
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord notification
        shell: bash
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_PATH: ${{ github.event_path }}
          EVENT_ACTION: ${{ github.event.action }}
          ACTOR: ${{ github.actor }}
          REPO_NAME: ${{ github.repository }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          set -euo pipefail

          EVENT_PATH="${EVENT_PATH:-${GITHUB_EVENT_PATH:-}}"
          if [ -z "$WEBHOOK_URL" ]; then
            echo "Error: DISCORD_WEBHOOK_URL secret is not set."
            exit 1
          fi

          TIMESTAMP=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          EVENT_TITLE=""
          EVENT_DESC=""
          EVENT_COLOR=7506394
          EVENT_URL=""

          if [ -z "${EVENT_PATH:-}" ] || [ ! -f "$EVENT_PATH" ]; then
            echo "Warning: EVENT_PATH is unavailable or missing ($EVENT_PATH)."
            if [ "$EVENT_NAME" = "watch" ]; then
              WATCH_ACTION="${EVENT_ACTION:-unknown}"
              EVENT_TITLE="ŌŁÉ [$REPO_NAME] Star Event"
              EVENT_DESC="**Actor:** \\`$ACTOR\\`\n**Action:** \\`$WATCH_ACTION\\`"
              EVENT_COLOR=16766720
            elif [ "$EVENT_NAME" = "fork" ]; then
              EVENT_TITLE="­¤Ź┤ [$REPO_NAME] New Fork"
              EVENT_DESC="**Actor:** \\`$ACTOR\\` has forked the repository."
              EVENT_COLOR=16766720
            else
              echo "Cannot handle event $EVENT_NAME without EVENT_PATH."
              exit 1
            fi
          else
            if [ "$EVENT_NAME" = "push" ]; then
              REF=$(jq -r '.ref' "$EVENT_PATH")
              BRANCH=${REF#refs/heads/}
              PUSHER=$(jq -r '.pusher.name // .pusher.email' "$EVENT_PATH")
              COMPARE_URL=$(jq -r '.compare' "$EVENT_PATH")
              COMMIT_COUNT=$(jq '.commits | length' "$EVENT_PATH")
              if [ "$COMMIT_COUNT" -eq 0 ]; then
                echo "No commits in this push event. Skipping notification."
                exit 0
              fi
              COMMIT_LIST=$(jq -r '[.commits[] | "- [`" + (.id[0:7]) + "`](`" + .url + "`) " + (.message | split("\n")[0]) + " (*" + .author.name + "*)"] | join("\n")' "$EVENT_PATH")
              EVENT_TITLE="­¤ö© [$REPO_NAME] Push to $BRANCH"
              EVENT_DESC="**Pusher:** \\`$PUSHER\\`\n**Branch:** \\`$BRANCH\\`\n\n**Commits:**\n$COMMIT_LIST"
              EVENT_COLOR=48340
              EVENT_URL="$COMPARE_URL"

            elif [ "$EVENT_NAME" = "pull_request" ]; then
              ACTION=$(jq -r '.action' "$EVENT_PATH")
              PR_NUMBER=$(jq -r '.pull_request.number' "$EVENT_PATH")
              PR_TITLE=$(jq -r '.pull_request.title' "$EVENT_PATH")
              PR_URL=$(jq -r '.pull_request.html_url' "$EVENT_PATH")
              PR_USER=$(jq -r '.pull_request.user.login' "$EVENT_PATH")
              PR_STATE=$(jq -r '.pull_request.state' "$EVENT_PATH")
              PR_MERGED=$(jq -r '.pull_request.merged' "$EVENT_PATH")
              if [ "$ACTION" = "closed" ] && [ "$PR_MERGED" = "true" ]; then
                PR_STATUS="Merged ­¤Æ£"
                EVENT_COLOR=5763719
              elif [ "$ACTION" = "closed" ]; then
                PR_STATUS="Closed ŌØī"
                EVENT_COLOR=14495514
              elif [ "$ACTION" = "reopened" ]; then
                PR_STATUS="Reopened ­¤öä"
                EVENT_COLOR=48340
              else
                PR_STATUS="Opened ­¤ÜĆ"
                EVENT_COLOR=3066993
              fi
              EVENT_TITLE="­¤ō” [$REPO_NAME] Pull Request #$PR_NUMBER $PR_STATUS"
              EVENT_DESC="**Title:** $PR_TITLE\n**Author:** \\`$PR_USER\\`\n**State:** \\`$PR_STATE\\`\n**Action:** \\`$ACTION\\`"
              EVENT_URL="$PR_URL"

            elif [ "$EVENT_NAME" = "fork" ]; then
              FORKEE_URL=$(jq -r '.forkee.html_url' "$EVENT_PATH")
              EVENT_TITLE="­¤Ź┤ [$REPO_NAME] New Fork"
              EVENT_DESC="**Actor:** \\`$ACTOR\\`\n**Fork:** <$FORKEE_URL>"
              EVENT_COLOR=16766720
              EVENT_URL="$FORKEE_URL"

            elif [ "$EVENT_NAME" = "watch" ]; then
              WATCH_ACTION=$(jq -r '.action' "$EVENT_PATH")
              EVENT_TITLE="ŌŁÉ [$REPO_NAME] Star Event"
              EVENT_DESC="**Actor:** \\`$ACTOR\\`\n**Action:** \\`$WATCH_ACTION\\`"
              EVENT_COLOR=16766720

            elif [ "$EVENT_NAME" = "issues" ]; then
              ISSUE_ACTION=$(jq -r '.action' "$EVENT_PATH")
              ISSUE_NUMBER=$(jq -r '.issue.number' "$EVENT_PATH")
              ISSUE_TITLE=$(jq -r '.issue.title' "$EVENT_PATH")
              ISSUE_URL=$(jq -r '.issue.html_url' "$EVENT_PATH")
              ISSUE_STATE=$(jq -r '.issue.state' "$EVENT_PATH")
              EVENT_TITLE="­¤Éø [$REPO_NAME] Issue #$ISSUE_NUMBER $ISSUE_ACTION"
              EVENT_DESC="**Title:** $ISSUE_TITLE\n**State:** \\`$ISSUE_STATE\\`\n**Action:** \\`$ISSUE_ACTION\\`"
              EVENT_COLOR=1127128
              EVENT_URL="$ISSUE_URL"

            elif [ "$EVENT_NAME" = "release" ]; then
              RELEASE_ACTION=$(jq -r '.action' "$EVENT_PATH")
              RELEASE_TAG=$(jq -r '.release.tag_name' "$EVENT_PATH")
              RELEASE_URL=$(jq -r '.release.html_url' "$EVENT_PATH")
              EVENT_TITLE="­¤ÅĘ’ĖÅ [$REPO_NAME] Release $RELEASE_ACTION"
              EVENT_DESC="**Tag:** \\`$RELEASE_TAG\\`\n**Action:** \\`$RELEASE_ACTION\\`"
              EVENT_COLOR=3447003
              EVENT_URL="$RELEASE_URL"

            else
              echo "Unsupported event: $EVENT_NAME. Skipping notification."
              exit 0
            fi
          fi

          PAYLOAD=$(jq -n \
            --arg username "GitHub Actions" \
            --arg avatar_url "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" \
            --arg title "$EVENT_TITLE" \
            --arg description "$EVENT_DESC" \
            --arg url "$EVENT_URL" \
            --arg timestamp "$TIMESTAMP" \
            --argjson color "$EVENT_COLOR" \
            '{username: $username, avatar_url: $avatar_url, embeds: [{title: $title, url: $url, description: $description, color: $color, footer: {text: "CBSE Accountability Log Activity"}, timestamp: $timestamp}]}'
          )

          curl -sS -X POST -H "Content-Type: application/json" -d "$PAYLOAD" "$WEBHOOK_URL"

